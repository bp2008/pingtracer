name: .NET Core CI/CD Pipeline

on:
  push:
    branches:
       - '*'  
  pull_request:
    branches:
       - '*'  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v2

      # Set up .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0'  # Replace with your version

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build the application
      - name: Build the project
        run: dotnet build --configuration Release

      # Run Unit Tests
      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      # Security scan using .NET Security
      - name: Run .NET security analysis
        run: dotnet tool install --global dotnet-security --version 1.0.0-beta1
        continue-on-error: true

      - name: Analyze project security
        run: dotnet security analyze