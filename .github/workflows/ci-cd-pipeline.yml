name: .NET Core CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v2

      # Set up .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0'  # Replace with your version

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build the application
      - name: Build the project
        run: dotnet build --configuration Release

      # Run Unit Tests
      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      # Security scan using .NET Security
      - name: Run .NET security analysis
        run: dotnet tool install --global dotnet-security --version 1.0.0-beta1
        continue-on-error: true

      - name: Analyze project security
        run: dotnet security analyze

      # (Optional) Run SonarCloud scan (for deeper security and quality checks)
      - name: SonarCloud Analysis
        uses: sonarsource/sonarcloud-github-action@v1.2
        with:
          organization: 'your-sonarcloud-organization'
          token: ${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      # Example: Deploy to Azure (modify this step based on your environment)
      - name: Set up Azure CLI
        uses: azure/setup-azurecli@v1

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure
        run: |
          az webapp up --name your-webapp-name --resource-group your-resource-group
