name: .NET Framework CI/CD Pipeline

on:
  push:
    branches:
       - '*'  # Trigger on push to any branch
  pull_request:
    branches:
       - '*'  # Trigger on pull request to any branch

jobs:
  build:
    runs-on: windows-latest  # Use Windows runner for .NET Framework

    steps:
      # Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v2

      # Install .NET Framework version (this should be pre-installed on the runner)
      - name: Install .NET Framework 4.6.2
        run: |
          choco install netfx-4.6.2-devpack

      # Restore dependencies for .NET Framework
      - name: Restore NuGet packages
        run: nuget restore PingTest/PingTracer.sln

      # Build the application using MSBuild (for .NET Framework)
      - name: Build the project
        run: msbuild PingTest/PingTracer.sln /p:Configuration=Release

      # Run Unit Tests using Visual Studio Test (vstest.console.exe)
    #  - name: Run unit tests
    #    run: |
    #      vstest.console.exe **\*Test*.dll /EnableCodeCoverage:true

      # Security scan using .NET Security or custom tools
      - name: Run .NET security analysis (optional)
        run: |
          dotnet tool install --global dotnet-security --version 1.0.0-beta1
        continue-on-error: true

      - name: Analyze project security
        run: |
          dotnet security analyze
